<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>无标题文档</title>
	<style>
		*{
			margin: 0px;
			padding: 0px;
		}
		.tab-container{
			background: #a4278b;
		height: 45px;
			width: 100%;
			line-height: 45px;
			margin-bottom: 10px;
		}
		.tab{
			width: 33.3333333%;
		float: left;
			line-height: inherit;
			text-align: center;
			color: white;
			
		}
		.tab:hover{
			transition: all 0.5s;
			background: #172967;
		}
	.container{
		
		width: 750px;
		margin: 10px auto;
		border: 1px solid #aaa;
		}
		.img{
			width: 750px;
			
			display: none;
		}
	</style>
	<script src="https://cdn.bootcss.com/jquery/3.3.1/jquery.min.js"></script>
	<script>
	$(function(){
		$('.tab').click(function(){
			$('.tab').css('background','#a4278b');
			$(this).css('background','#172967');
		var data=$(this).attr('data');	
			$('.img').css('display',"none");
			$("[img-data='"+data+"']").css('display','block');
		});
	})
	
	</script>
</head>

<body>
	<div class="container">
	<div class="tab-container">
				<div class="tab" data="2" style="background: #172967">QQ邮箱</div>
			<div class="tab" data="0">126邮箱</div>
				<div class="tab" data="1">163邮箱</div>


		
		</div>
	<div class="img-container">
		<img src="http://ipaau.org.cn/member/MyAccount/newsLetter/whitelist/126.jpg" class="img" img-data="0" />
		<img src="http://ipaau.org.cn/member/MyAccount/newsLetter/whitelist/163.jpg" class="img" img-data="1"/>
		<img src="http://ipaau.org.cn/member/MyAccount/newsLetter/whitelist/QQ.jpg"  class="img" img-data="2" style="display: block;"/>
		</div>
	</div>
</body>
</html>
